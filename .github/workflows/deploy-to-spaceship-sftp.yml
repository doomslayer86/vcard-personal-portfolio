name: Deploy to Spaceship (SFTP)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          remote_path: ${{ secrets.FTP_REMOTE_PATH }}
          local_path: ./
          sftp_only: true
          delete_remote_files: false
          rsyncArgs: --exclude='.git' --exclude='.git/**' --exclude='.github' --exclude='.github/**' --exclude='node_modules' --exclude='node_modules/**' --exclude='README.md' --exclude='LICENSE' --exclude='package.json' --exclude='package-lock.json' --exclude='.gitignore' --exclude='.env' --exclude='.env.*'
